{% load static %}
<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Subtitle Service{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'videos/styles.css' %}">
</head>
<body>
    <header class="topbar">
        <a class="brand" href="{% url 'videos:index' %}">Subtitle Service</a>
        <nav class="topbar__nav">
            {% if request.user.is_authenticated %}
                <span class="topbar__meta">{{ request.user.username }}</span>
                <form action="{% url 'videos:logout' %}" method="post">
                    {% csrf_token %}
                    <button type="submit" class="link-button">Выйти</button>
                </form>
            {% else %}
                <a class="link-button" href="{% url 'videos:login' %}">Войти</a>
                <a class="primary-button primary-button--small" href="{% url 'videos:register' %}">Регистрация</a>
            {% endif %}
        </nav>
    </header>

    <main class="page">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
